<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarcasm Detector — NLP Analysis</title>
    <meta name="description" content="AI-powered sarcasm detection using RoBERTa. Paste a conversation and see each message analyzed for sarcasm in real time.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Modern UI Enhancements */
        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.03) 0px, transparent 50%);
        }

        .app {
            max-width: 800px; /* Restoring reasonable width so it doesn't look stretched */
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Top Navigation: Clean and separated */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .top-nav .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-nav .logo-title {
            font-size: 2.25rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .hero-badge span.pulse {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .btn-glow {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-glow:hover::after {
            left: 100%;
        }

        /* Left-aligned hero to fix "everything in middle" feel */
        .hero-section {
            text-align: left;
            margin-bottom: 30px;
        }

        .hero-section h1 {
            font-size: 1.95rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 12px;
            color: #fff;
            letter-spacing: -0.03em;
        }

        .hero-section p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.6;
        }

        /* Remove empty state box from DOM entirely to revert to original smooth look */
    </style>
</head>
<body>
    <div class="app">
        <!-- Minimal Top Navigation -->
        <nav class="top-nav">
            <div class="logo-area">
                <a href="/" class="logo-title">Sarcasm Detector</a>
            </div>
            <a href="/how-it-works" class="btn-glow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                How it Works
            </a>
        </nav>

        <!-- Main Content (Stacked Single Column, Left Aligned) -->
        <main class="main">
            <header class="hero-section">
                <h1>Analyze Conversations for Sarcasm.</h1>
                <p class="subtitle">Paste your chat below. Our Context-Aware RoBERTa Transformer will read the flow of the conversation and highlight any ironic contradictions.</p>
            </header>

            <!-- Input Section -->
            <section class="input-section" id="input-section">
                <div class="input-card">
                    <label for="conversation-input" class="input-label">Chat Input</label>
                    <textarea
                        id="conversation-input"
                        placeholder="Alice: I'm throwing a party this weekend&#10;Bob: Great, another gathering where I can stand in the corner&#10;Alice: You don't have to come if you don't want to&#10;Bob: Oh I wouldn't miss it for the world"
                        rows="7"
                    ></textarea>
                    <div class="input-footer">
                        <span class="format-hint">Format: <code>Name: Message</code></span>
                        <div class="button-group">
                            <button id="clear-btn" class="btn-secondary" onclick="clearConversation()">
                                <span class="btn-text">Clear</span>
                            </button>
                            <button id="analyze-btn" onclick="analyzeConversation()">
                                <span class="btn-text">Analyze Text</span>
                                <span class="btn-loader" id="btn-loader"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>



            <!-- Results -->
            <section class="results-section" id="results-section">
                <div class="chat-container" id="chat-container"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer" style="text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 40px;">
            <p>HMM → LSTM → BERT → RoBERTa &mdash; The Evolution of NLP</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
